[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llm-function-tools"
version = "0.0.1"
description = "Minimal metadata and discovery helpers for typed Python tools used by llm_function runtimes."
readme = "README.md"
requires-python = ">=3.8"
keywords = ["aa-paa-tool"]
classifiers = ["Development Status :: 3 - Alpha"]
dependencies = ["pydantic"]
authors = [{ name = "Kyrylo Mordan", email = "parachute.repo@gmail.com" }]
license = { text = "apache-2.0" }

[project.urls]
"Homepage" = "https://kiril-mordan.github.io/adaptive-reusables/llm-function-tools/"

[tool.setuptools]
license-files = ["LICENSE", "NOTICE"]
